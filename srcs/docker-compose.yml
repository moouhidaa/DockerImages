version: '3'


secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentails:
    file : ../secrets/credentials.txt

services:
  mariadb:
    build : ./requirements/mariadb
    container_name: mariadb
    env_file :
      - .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      -db_data:/var/lib/mysql
    networks:
      - inception
    restart  : always
  wordpress :
    build:  ./requirements/wordpress
    container_name:    wordpress
    env_file :
      - .env
    secrets :
      - db_password
      - credentails
    volumes:
      -wp_data:/var/www/html
    networks:
      - inception
    depends_on:
      - mariadb
    restart : always
  nginx :
    build: ./requirements/nginx
    container_name: nginx
    port :
     - "433:433"
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    depends_on :
     -  wordpress
    restart : always

networks:
  inception :
    driver :  bridge

volumes:
  db_data:
    driver: local
  dp_data:
    driver:  local