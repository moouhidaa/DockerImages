version: '3'

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt

services:

  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception
    restart: always

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    env_file:
      - .env
    secrets:
      - db_password
      - credentials
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    depends_on:
      - mariadb
    restart: always

  nginx:
    build: ./requirements/nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress
    restart: always

  redis:
    build : ./requirements/bonus/redis
    container_name: redis
    restart:  unless-stopped
    networks:
    - inception
    depends_on:
    - wordpress
  adminer:
    build: ./requirements/bonus/adminer
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - inception
    depends_on:
      - mariadb
  ftp:
    build: ./requirements/bonus/ftp
    container_name: ftp
    restart: unless-stopped
    ports:
      - "21"
      - "20"
      - "30000-31000"
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    env_file:
      - .env
    depends_on:
      - wordpress
  backup:
    build: ./requirements/backup
    conatinaer: backup
    networks:
      - inception
    depends_on:
      - wordpress
      - mariadb
    secrests:
      - db_password
    env_file:
      - .env
    volumes:
      - wp_data:/var/www/html
      - ./back_up:/backups
networks:
  inception:
    driver: bridge

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/moouhida/data/mysql
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/moouhida/data/wordpress
  back_up:
    driver:  local
    driver_opts:
      type: none
      o: bind
      device: /home/moouhida/data/backups